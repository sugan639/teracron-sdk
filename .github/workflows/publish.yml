# Publishes to PyPI on every version tag (v*.*.*) using OIDC Trusted Publishers.
# No API tokens or secrets required — GitHub proves identity via short-lived OIDC JWT.
#
# Setup (one-time):
#   1. Register "teracron-sdk" as a pending publisher on PyPI:
#      https://pypi.org/manage/account/publishing/
#   2. Fill in: owner=<your-github-username>, repo=teracron-sdk, workflow=publish.yml, environment=pypi
#   3. Push a tag: git tag v0.1.0 && git push origin v0.1.0

name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"        # v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+" # v1.2.3-rc.1

# Cancel any in-flight publish for the same tag
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate: run full test suite before publishing ────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Security scan (bandit)
        run: bandit -r teracron/ -q

  # ── Build sdist + wheel ────────────────────────────────────────────
  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate package metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 5

  # ── Publish to PyPI via OIDC (no secrets needed) ───────────────────
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi                    # Must match the environment name on PyPI
    permissions:
      id-token: write                    # Required for OIDC token minting
      contents: read
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No api-token or password — OIDC handles authentication

  # ── Create GitHub Release with changelog ───────────────────────────
  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
